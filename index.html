<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Ev Listemiz 🏠</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans text-gray-800">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold italic">Taşınma Günlüğü</h1>
            <p class="text-blue-100 text-sm mt-1">Her şey kontrol altında bro!</p>
        </div>

        <div class="p-6 space-y-4">
            <input type="text" id="taskInput" placeholder="Ne yapılacak?" 
                   class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            
            <div class="flex space-x-2">
                <select id="categorySelect" class="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm">
                    <option value="oncesi">📦 Taşınma Öncesi</option>
                    <option value="sonrasi">🚛 Taşınma Sonrası</option>
                </select>
                <button onclick="addTask()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition">
                    EKLE
                </button>
            </div>
        </div>

        <div class="px-6 pb-8 space-y-6">
            <section>
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Taşınma Öncesi İşler</h2>
                <ul id="list-oncesi" class="space-y-3"></ul>
            </section>

            <section>
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Taşınma Sonrası İşler</h2>
                <ul id="list-sonrasi" class="space-y-3"></ul>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Senin verdiğin güncel config
        const firebaseConfig = {
            apiKey: "AIzaSyAdMfObhNZRF6Mi-N0hWbOcNGwkpqHH_Vs",
            authDomain: "liste-6f2fa.firebaseapp.com",
            projectId: "liste-6f2fa",
            storageBucket: "liste-6f2fa.firebasestorage.app",
            messagingSenderId: "168334188265",
            appId: "1:168334188265:web:d4ff498b3bc6214645da78",
            measurementId: "G-G5MFNJ6XVZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tasksCol = collection(db, "yapilacaklar");

        window.addTask = async () => {
            const input = document.getElementById('taskInput');
            const category = document.getElementById('categorySelect').value;
            
            if (input.value.trim() !== "") {
                try {
                    await addDoc(tasksCol, {
                        text: input.value,
                        category: category,
                        completed: false,
                        createdAt: Date.now()
                    });
                    input.value = "";
                } catch (e) {
                    alert("Veri eklenemedi: " + e.message);
                }
            }
        };

        const q = query(tasksCol, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const listOncesi = document.getElementById('list-oncesi');
            const listSonrasi = document.getElementById('list-sonrasi');
            listOncesi.innerHTML = "";
            listSonrasi.innerHTML = "";

            snapshot.forEach((docSnap) => {
                const task = docSnap.data();
                const id = docSnap.id;
                
                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-4 rounded-xl border transition-all ${task.completed ? 'bg-gray-50 border-gray-100' : 'bg-white border-gray-200 shadow-sm'}`;
                li.innerHTML = `
                    <div class="flex items-center space-x-3 flex-1 cursor-pointer" onclick="toggleTask('${id}', ${task.completed})">
                        <div class="w-6 h-6 border-2 rounded-full flex items-center justify-center ${task.completed ? 'bg-green-500 border-green-500' : 'border-gray-300'}">
                            ${task.completed ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                        <span class="${task.completed ? 'line-through text-gray-400' : 'text-gray-700 font-medium'}">${task.text}</span>
                    </div>
                    <button onclick="deleteTask('${id}')" class="ml-2 text-gray-300 hover:text-red-500 p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;

                if (task.category === "oncesi") listOncesi.appendChild(li);
                else listSonrasi.appendChild(li);
            });
        });

        window.toggleTask = async (id, currentStatus) => {
            await updateDoc(doc(db, "yapilacaklar", id), { completed: !currentStatus });
        };

        window.deleteTask = async (id) => {
            if(confirm("Bu görevi siliyorum?")) {
                await deleteDoc(doc(db, "yapilacaklar", id));
            }
        };
    </script>
</body>
</html>
